<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBRA — Acertive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141714;
    --surface2: #1a1d1a;
    --border: #2a2e2a;
    --border2: #3a3f3a;
    --green: #4ade80;
    --green-dim: #1a3a24;
    --green-glow: rgba(74,222,128,0.08);
    --text: #e8ede8;
    --text-dim: #7a8a7a;
    --text-muted: #4a574a;
    --danger: #f87171;
    --warning: #fbbf24;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* SETUP SCREEN */
  #setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    gap: 2rem;
  }
  .setup-logo {
    font-family: 'Syne', sans-serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -0.02em;
  }
  .setup-logo span { color: var(--text-dim); font-size: 1rem; font-family: 'DM Mono', monospace; font-weight: 400; display: block; margin-top: 4px; letter-spacing: 0.1em; }
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }
  .setup-card label {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 6px;
  }
  .setup-card input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setup-card input:focus { border-color: var(--green); }
  .setup-card input::placeholder { color: var(--text-muted); }
  .btn-primary {
    background: var(--green);
    color: #0d0f0e;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 14px;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.99); }
  .setup-note {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
  }

  /* MAIN APP */
  #app { display: none; flex-direction: column; height: 100vh; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.875rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -0.02em;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .status-text { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.08em; }
  .btn-reset {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 10px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-reset:hover { border-color: var(--border2); color: var(--text-dim); }

  /* CHAT AREA */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* WELCOME */
  .welcome {
    background: var(--green-glow);
    border: 1px solid var(--green-dim);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 0.5rem;
  }
  .welcome-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 8px;
  }
  .welcome-body { font-size: 0.82rem; color: var(--text-dim); line-height: 1.7; }
  .quick-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 1rem;
  }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    text-align: left;
  }
  .quick-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-glow); }

  /* MESSAGES */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .msg-user { align-items: flex-end; }
  .msg-cobra { align-items: flex-start; }
  .msg-label { font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.08em; padding: 0 4px; }
  .msg-bubble {
    max-width: 88%;
    padding: 12px 16px;
    border-radius: var(--radius-lg);
    font-size: 0.84rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-user .msg-bubble {
    background: var(--green-dim);
    border: 1px solid #2a5a3a;
    color: var(--text);
    border-bottom-right-radius: 4px;
  }
  .msg-cobra .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  /* TYPING */
  .typing-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* ERROR */
  .msg-error .msg-bubble {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--danger);
  }

  /* INPUT AREA */
  #input-area {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 0.875rem 1rem;
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.84rem;
    padding: 12px 14px;
    outline: none;
    resize: none;
    min-height: 48px;
    max-height: 160px;
    line-height: 1.5;
    transition: border-color 0.2s;
    overflow-y: auto;
  }
  #user-input:focus { border-color: var(--green); }
  #user-input::placeholder { color: var(--text-muted); }
  #send-btn {
    background: var(--green);
    border: none;
    border-radius: var(--radius);
    width: 48px;
    height: 48px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.96); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 20px; height: 20px; fill: #0d0f0e; }
  .input-hint { font-size: 0.68rem; color: var(--text-muted); margin-top: 6px; letter-spacing: 0.04em; }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    .msg-bubble { max-width: 95%; font-size: 0.82rem; }
    header { padding: 0.75rem 1rem; }
    .logo { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-logo">
    COBRA
    <span>ACERTIVE ASSESSORIA E COBRANÇA</span>
  </div>
  <div class="setup-card">
    <div>
      <label>SEU NOME</label>
      <input type="text" id="setup-name" placeholder="Ex: Karla" autocomplete="name" />
    </div>
    <div>
      <label>CHAVE DA API (sk-ant-...)</label>
      <input type="password" id="setup-key" placeholder="Cole aqui sua chave da Anthropic" autocomplete="off" />
    </div>
    <button class="btn-primary" onclick="iniciarApp()">ENTRAR NO COBRA</button>
    <p class="setup-note">Sua chave fica salva apenas neste navegador.<br>Nunca é enviada para nenhum servidor externo.</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="logo">COBRA</div>
      <div class="status-dot"></div>
      <span class="status-text">ONLINE</span>
    </div>
    <button class="btn-reset" onclick="resetApp()">SAIR</button>
  </header>

  <div id="chat"></div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="Cole aqui a mensagem do devedor ou faça uma pergunta..." rows="1"></textarea>
      <button id="send-btn" onclick="enviar()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="input-hint">Enter para enviar · Shift+Enter para nova linha</p>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Você é COBRA — o maior especialista em cobrança, recuperação de crédito e gestão de inadimplência do Brasil. Você atua como co-piloto em tempo real da negociadora da Acertive Assessoria e Cobrança, empresa baseada em Manaus-AM.

CONTEXTO OPERACIONAL DA ACERTIVE:
- Canal principal: WhatsApp
- Devedores: pessoa física, dívidas até R$2.000, inadimplência abaixo de 90 dias
- Clientes cedentes atuais: Fogás, TransbyShop, Odonto Vitta
- Negociadora: Karla (você está ajudando ela em tempo real)

SEU PAPEL:
A Karla vai colar mensagens que recebeu de devedores e perguntar o que responder. Você deve:
1. Analisar o perfil e a objeção do devedor
2. Gerar a resposta exata para ela copiar e enviar no WhatsApp
3. Explicar brevemente a estratégia (1-2 linhas)
4. Sugerir próximo passo se necessário

REGRAS DE COMUNICAÇÃO:
- Respostas para o devedor: linguagem simples, direta, empática, sem juridiquês
- Nunca ameace ilegalmente (respeite CDC e Lei 8.078)
- Crie senso de urgência real sem agressividade
- O devedor deve sair da conversa com dignidade para honrar o acordo
- Use técnicas: SPIN, Challenger Sale, Sandler, Hormozi Offer Framework
- Adapte tom ao perfil DISC do devedor

OBJEÇÕES FREQUENTES E ESTRATÉGIAS:
- "Não tenho dinheiro": "Quanto você conseguiria agora? A gente monta em cima disso."
- Ignora/não responde: sequência de 3 contatos → pré-negativação → prazo final
- "Vou pagar semana que vem": transforme em compromisso com boleto/data
- "Já paguei": peça comprovante imediatamente

FORMATO DAS SUAS RESPOSTAS:
Quando a Karla colar uma mensagem de devedor, responda assim:

📋 ANÁLISE: [perfil do devedor em 1 linha]

💬 RESPOSTA PARA ENVIAR:
[mensagem pronta para copiar]

🎯 ESTRATÉGIA: [por quê essa abordagem em 1-2 linhas]

⏭️ PRÓXIMO PASSO: [o que fazer dependendo da resposta]

Quando for uma pergunta geral da Karla (não uma mensagem de devedor), responda de forma direta e prática, sem o formato acima.`;

let conversationHistory = [];
let apiKey = '';
let userName = '';
let isLoading = false;

function iniciarApp() {
  const name = document.getElementById('setup-name').value.trim();
  const key = document.getElementById('setup-key').value.trim();
  if (!key.startsWith('sk-ant-')) {
    alert('Chave inválida. Deve começar com sk-ant-');
    return;
  }
  if (!name) {
    alert('Coloca seu nome antes de continuar.');
    return;
  }
  apiKey = key;
  userName = name;
  localStorage.setItem('cobra_key', key);
  localStorage.setItem('cobra_name', name);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderBemVindo();
}

function resetApp() {
  if (!confirm('Sair e limpar a sessão?')) return;
  localStorage.removeItem('cobra_key');
  localStorage.removeItem('cobra_name');
  location.reload();
}

function renderBemVindo() {
  const chat = document.getElementById('chat');
  const ações = [
    'Devedor disse: "não tenho dinheiro agora"',
    'Devedor está ignorando minhas mensagens',
    'Como fazer uma oferta irrecusável?',
    'Devedor quer parcelar em 5x, o máximo é 3x',
    'Devedor disse que já pagou',
    'Como fazer a mensagem de pré-negativação?'
  ];
  chat.innerHTML = `
    <div class="welcome">
      <div class="welcome-title">Olá, ${userName}! COBRA ativo.</div>
      <div class="welcome-body">Cole aqui a mensagem que o devedor te mandou e eu te digo exatamente o que responder. Ou me faça qualquer pergunta sobre negociação, scripts e estratégia.</div>
      <div class="quick-actions">
        ${ações.map(a => `<button class="quick-btn" onclick="usarAcaoRapida('${a.replace(/'/g,"\\'")}')">↗ ${a}</button>`).join('')}
      </div>
    </div>`;
}

function usarAcaoRapida(texto) {
  document.getElementById('user-input').value = texto;
  enviar();
}

function adicionarMensagem(role, conteudo, isError = false) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg msg-${role === 'user' ? 'user' : isError ? 'error' : 'cobra'}`;
  div.innerHTML = `
    <div class="msg-label">${role === 'user' ? userName.toUpperCase() : 'COBRA'}</div>
    <div class="msg-bubble">${conteudo.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function mostrarTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg msg-cobra';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-label">COBRA</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removerTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function enviar() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const texto = input.value.trim();
  if (!texto) return;

  input.value = '';
  input.style.height = 'auto';
  adicionarMensagem('user', texto);
  conversationHistory.push({ role: 'user', content: texto });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  mostrarTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || `Erro ${response.status}`);
    }

    const resposta = data.content[0].text;
    conversationHistory.push({ role: 'assistant', content: resposta });
    removerTyping();
    adicionarMensagem('cobra', resposta);
  } catch (err) {
    removerTyping();
    adicionarMensagem('cobra', `Erro ao conectar: ${err.message}\n\nVerifique sua chave de API e tente novamente.`, true);
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

// Auto-resize textarea
document.addEventListener('DOMContentLoaded', () => {
  const saved_key = localStorage.getItem('cobra_key');
  const saved_name = localStorage.getItem('cobra_name');
  if (saved_key && saved_name) {
    document.getElementById('setup-key').value = saved_key;
    document.getElementById('setup-name').value = saved_name;
    iniciarApp();
  }

  const input = document.getElementById('user-input');
  if (input) {
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        enviar();
      }
    });
  }
});
</script>
</body>
</html>
